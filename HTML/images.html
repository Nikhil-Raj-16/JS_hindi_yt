<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <style>
        body{
            background-color: #414141;
        }
    </style>
</head>
<body>
    <img src="https://images.unssfsplash.com/photo-1759520582331-8b62a819a452?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw0fHx8ZW58MHx8fHx8" width="300px" alt="No Image">
    <img src="./Test_imdage.avif" width="300px" alt="No Image">

    <!-- to duplicate code alt + shift + down arrow -->
 
    <picture>
        <source media="(min-width: 400px)" srcset="./Test_image_2.avif"/>
        <img src="./Test_image.avif" alt="No image">

    </picture>

    <!-- In picture if media true it runs else img src runs , used if we want another image in other small pixels devices-->


    <!-- An image map generator -->

    <!-- Image Map Generated by http://www.image-map.net/ -->

    <!-- in post in Instagram, there it is used as we tag our friends -->
    <img src="sale.avif" usemap="#image-map">

    <map name="image-map">
        <area onclick="one()" target="_blank" alt="Shopping" title="Shopping" href="" coords="426,375,440" shape="circle">
        <area onclick="two()" target="_blank" alt="Bank" title="Bank" href="" coords="10,943,493,996" shape="rect">
    </map>    
    <script>
        function one(){ 
            alert("You clicked on Shopping")
        }
        function two(){
            alert("You clicked on Bank Cards Discount")
        }
    </script>
</body>
</html>
