<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #414141;
            color: #fff;
        }
    </style>
</head>
<body>
        <h1>Forms in HTML</h1>
        <!-- post - data is not shown to you, means in protected manner , get - data is shown to you  -->
        <form action="url" method="GET" accept-charset="UTF-8" autocomplete="off" enctype="multipart/form-data" >
            <label for="fname">First Name</label>
            <br>
            <input type="text" placeholder="First Name" name="" id="fname">
            <br>
            <br>
            <label for="lname">Last Name</label>
            <br>
            <input type="text" placeholder="Last Name" name="" id="lname">
            <br>
            <input type="file" name="" id="">
            <br><br>
            <button type="submit">Submit</button>
        </form>

</body>
</html>
