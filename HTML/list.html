<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>My List</h1>
    <h2>Unordered List</h2>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
    <!-- ul>li*5{5} -->
    <h2>Ordered List</h2>
    <ol type="i">
        <li>ONE</li>
        <li>TWO</li>
        <li>THREE</li>
    </ol>

    <h2>Nested List</h2>
    <ul>
        <li>
            1
            <ol>
                <li>hello</li>
                <li>hi</li>
            </ol>
        </li>
        <li>
            2
            <ol>
                <li>HO</li>
                <li>HIW</li>
            </ol>
        </li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
    <h2>Data List</h2>
    <dl>
        <dt>Topic</dt>
        <dd>Description</dd>
    </dl>

<!-- page pei pura block lete hai wo block elements like heading tag, paragraph -->
<!-- whereas span in an inline element -->

<span>sahdaisd</span>

</body>
</html>
