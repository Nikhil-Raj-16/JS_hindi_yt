<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Request</title>
</head>
<body style="background-color: #212121; color : aliceblue">
    0	UNSENT	Client has been created. open() not called yet.
    1	OPENED	open() has been called.
    2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
    3	LOADING	Downloading; responseText holds partial data.
    4	DONE	The operation is complete.

    <div>
        <img id="avatar" src="" alt="GitHub Avatar" width="200" style="border-radius: 50%; margin-top: 20px;">  
        <p id="follower"></p>
    </div>
</body>
<script>
    const xhr = new XMLHttpRequest();
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    xhr.open('GET',requestUrl);
    xhr.onreadystatechange = function () {
        console.log(xhr.readyState);
        if(xhr.readyState === 4){
            // const data = this.responseText;
            // convert string to json
            const data = JSON.parse(this.responseText);
            // console.log(typeof data); // undefined because we recieve string
             
            // console.log(typeof data);
            // console.log(data.followers);
            // console.log(data.avatar_url);
            // const image = data.avatar_url;
            const image = document.getElementById('avatar');
            image.src = data.avatar_url;
            const follower = document.getElementById('follower');
            const follow = data.followers;
            follower.innerHTML = `<p>Followers: ${follow}</p>`;
        }
    }
    
    xhr.send();
    
</script>
</html>
